<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Shop Pure Tulsi Mala, Radha Krishna Accessories &amp; Pooja Essentials</title>
    <meta id="meta-description" name="description" content="Brindarani offers authentic Tulsi Kanthi Mala, japa mala, Radha Krishna accessories, pooja essentials, and devotional products for Krishna bhakti." />
    <meta id="meta-keywords" name="keywords" content="Tulsi Mala, Tulsi Kanthi Mala, japa mala, Radha Krishna accessories, pooja essentials, Krishna bhakti, devotional products, Brindarani" />
    <meta id="meta-theme-color" name="theme-color" content="#d68a2e" />
    <link id="meta-canonical" rel="canonical" href="https://brindarani.com/" />
    <link id="icon-favicon" rel="icon" href="/placeholder.svg" />
    <link id="icon-apple" rel="apple-touch-icon" href="/placeholder.svg" />

    <!-- OpenGraph Metadata -->
    <meta id="og-title" property="og:title" content="Shop Pure Tulsi Mala, Radha Krishna Accessories &amp; Pooja Essentials" />
    <meta id="og-description" property="og:description" content="Brindarani offers authentic Tulsi Kanthi Mala, japa mala, Radha Krishna accessories, pooja essentials, and devotional products for Krishna bhakti." />
    <meta id="og-type" property="og:type" content="website" />
    <meta id="og-url" property="og:url" content="https://brindarani.com/" />
    <meta id="og-site-name" property="og:site_name" content="Brindarani" />
    <meta id="og-image" property="og:image" content="" />
    <meta id="og-image-alt" property="og:image:alt" content="Brindarani devotional products" />

    <!-- Twitter Metadata -->
    <meta id="twitter-card" name="twitter:card" content="summary_large_image" />
    <meta id="twitter-title" name="twitter:title" content="Shop Pure Tulsi Mala, Radha Krishna Accessories &amp; Pooja Essentials" />
    <meta id="twitter:description" name="twitter:description" content="Brindarani offers authentic Tulsi Kanthi Mala, japa mala, Radha Krishna accessories, pooja essentials, and devotional products for Krishna bhakti." />
    <meta id="twitter-image" name="twitter:image" content="" />

    <!-- Application Metadata -->
    <meta id="app-name" name="application-name" content="Brindarani" />
    <meta id="app-mobile-title" name="apple-mobile-web-app-title" content="Brindarani" />

    <!-- Robots & SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />

    <!-- Load settings early to avoid layout shift -->
    <script>
      (function() {
        const isProduction = window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1';
        const API_BASE = isProduction ? 'https://brindarani.onrender.com' : 'http://localhost:5000';
        const SETTINGS_URL = API_BASE + '/api/settings';

        fetch(SETTINGS_URL)
          .then(res => res.json())
          .then(settings => {
            const appName = settings.appName || 'Brindarani';
            const motto = (settings.motto || '').trim();
            const logoUrl = settings.logoUrl ? (settings.logoUrl.startsWith('http') ? settings.logoUrl : API_BASE + settings.logoUrl) : '';
            const faviconUrl = settings.faviconUrl ? (settings.faviconUrl.startsWith('http') ? settings.faviconUrl : API_BASE + settings.faviconUrl) : '';
            const pageUrl = window.location.href;

            // Set title
            const title = 'Shop Pure Tulsi Mala, Radha Krishna Accessories & Pooja Essentials';
            document.getElementById('page-title').textContent = title;
            document.getElementById('og-title').setAttribute('content', title);
            document.getElementById('twitter-title').setAttribute('content', title);
            document.getElementById('app-name').setAttribute('content', appName);
            document.getElementById('app-mobile-title').setAttribute('content', appName);
            document.getElementById('og-site-name').setAttribute('content', appName);

            // Set description
            const description = 'Brindarani offers authentic Tulsi Kanthi Mala, japa mala, Radha Krishna accessories, pooja essentials, and devotional products for Krishna bhakti.';
            document.getElementById('meta-description').setAttribute('content', description);
            document.getElementById('og-description').setAttribute('content', description);
            document.getElementById('twitter:description').setAttribute('content', description);

            // Set favicons
            if (faviconUrl) {
              document.getElementById('icon-favicon').setAttribute('href', faviconUrl);
              document.getElementById('icon-apple').setAttribute('href', faviconUrl);
            }

            // Set logo as OG image
            if (logoUrl) {
              document.getElementById('og-image').setAttribute('content', logoUrl);
              document.getElementById('og-image-alt').setAttribute('content', appName + ' logo');
              document.getElementById('twitter-image').setAttribute('content', logoUrl);
            }

            // Set URLs
            document.getElementById('meta-canonical').setAttribute('href', pageUrl);
            document.getElementById('og-url').setAttribute('content', pageUrl);
          })
          .catch(error => {
            console.warn('Failed to load app settings:', error);
            // Fallback values already set in meta tags
          });
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
